services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: leaks
      POSTGRES_USER: leaks
      POSTGRES_PASSWORD: leaks
    ports:
      - "5433:5432"
    volumes:
      - leaks_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaks -d leaks"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  leaks_postgres:
