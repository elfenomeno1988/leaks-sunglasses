<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie — LEAKS Sunglasses</title>
  <meta name="description" content="LEAKS — un modèle, ses coloris, toutes ses vues.">
  <link rel="icon" type="image/png" href="/assets/img/brand/eye.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/epure.css">
</head>
<body>

  <header class="nav">
    <a class="nav-brand" href="/" aria-label="LEAKS — accueil">
      <img src="/assets/img/brand/logo-word.png" alt="LEAKS Sunglasses">
    </a>
    <nav class="nav-links" aria-label="Navigation principale">
      <a href="/#collection">Collection</a>
      <a href="/campagne.html">Campagne</a>
      <a href="/#drop">Le Drop</a>
    </nav>
    <a class="nav-cta" href="/#rendez-vous">Réserver</a>
  </header>

  <main class="wrap" style="padding-top:96px;padding-bottom:var(--section)">
    <div class="g-shell">
      <figure class="g-visual r in">
        <img data-gallery-image src="" alt="">
        <div class="g-views" data-gallery-views role="group" aria-label="Vues du coloris"></div>
      </figure>

      <aside class="g-panel r in">
        <div>
          <span class="tag" data-gallery-view-tag>Face</span>
          <h1 data-gallery-title>Modèle</h1>
          <p class="desc" data-gallery-copy>Un modèle, plusieurs coloris.</p>
        </div>

        <dl class="g-lines">
          <div><dt>Modèle</dt><dd data-gallery-model>—</dd></div>
          <div><dt>Coloris</dt><dd data-gallery-color>—</dd></div>
          <div><dt>Référence</dt><dd data-gallery-sku>—</dd></div>
          <div><dt>Prix</dt><dd data-gallery-price>—</dd></div>
        </dl>

        <div>
          <p class="tag" style="margin-bottom:12px">Coloris</p>
          <div class="g-swatches" data-gallery-swatches></div>
        </div>

        <div class="g-actions">
          <a class="btn btn-ink" data-gallery-buy href="#">Acheter</a>
          <a class="btn btn-ghost" data-gallery-rdv href="#" data-wa-link>Essayer au studio</a>
        </div>

        <p class="tag"><a href="/#collection">← Toute la collection</a></p>
      </aside>
    </div>
  </main>

  <footer class="footer" style="margin-top:0">
    <div class="wrap">
      <div class="footer-bottom" style="margin-top:0;border-top:none">
        <span>LEAKS Sunglasses — Drop 001</span>
        <span>Édition 001 / ∞</span>
      </div>
    </div>
  </footer>

  <script src="/js/catalog-data.js"></script>
  <script src="/js/gallery.js" type="module"></script>
</body>
</html>
